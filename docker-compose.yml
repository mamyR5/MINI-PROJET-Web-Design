version: '3.8'

services:
  db:
    image: postgres:16
    container_name: postgres_db
    environment:
      POSTGRES_USER: user_admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: web_design_db
    ports:
      - "5433:5432"

  webapp:
    build: .
    container_name: tomcat_app
    ports:
      - "8081:8080"
    depends_on:
      - db